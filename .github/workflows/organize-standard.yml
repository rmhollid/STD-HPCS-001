name: Organize standard file

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move-standard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move standard files into standards folder
        run: |
          set -euo pipefail
          mkdir -p standards validation reports

          moved=0
          for version in 0.12.0 0.13.0 0.14.0 0.15.0 0.16.1 0.16.2; do
            src="STD-HPCS-001_v${version}.txt"
            dst="standards/STD-HPCS-001_v${version}.txt"
            if [ -f "$src" ]; then
              git mv "$src" "$dst"
              moved=1
            fi
          done

          if [ "$moved" -eq 1 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Move STD-HPCS standard files into standards folder"
            git push
          else
            echo "No standard-file move needed."
          fi
